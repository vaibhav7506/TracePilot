services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tracepilot
      POSTGRES_USER: tracepilot
      POSTGRES_PASSWORD: tracepilot
    ports:
      - "5432:5432"
    volumes:
      - tracepilot-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracepilot -d tracepilot"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  tracepilot-postgres:
